services:
  preprocess:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    volumes:
      - ./input:/input:ro
      - ./images:/images
      - ./ocr/preprocess.py:/app/preprocess.py:ro
    command: python /app/preprocess.py

  ocr:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    depends_on:
      preprocess:
        condition: service_completed_successfully
    environment:
      - FLAGS_use_mkldnn=0
    volumes:
      - ./images:/images:ro
      - ./output:/output
      - ./models:/root/.paddlex
      - ./ocr/ocr.py:/app/ocr.py:ro
    command: python /app/ocr.py

  # ---- TTS Multi-voice stage (section-based with dialog voices) ----
  # Run: docker compose --profile tts up tts_multivoice
  tts_multivoice:
    build:
      context: .
      dockerfile: tts/Dockerfile
    profiles: [tts]
    network_mode: host
    volumes:
      - ./lessons:/lessons:ro
      - ./audio:/audio
      - ./tts/tts_multivoice.py:/app/tts_multivoice.py:ro
    command: python /app/tts_multivoice.py /lessons /audio

  # ---- Reconstruction stage ----
  # These don't run with `docker compose up`. Use:
  #   docker compose --profile reconstruct up
  # to run them after OCR is done.
  reconstruct_layout:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    profiles: [reconstruct]
    volumes:
      - ./output:/output
      - ./reconstruct/reconstruct_layout.py:/app/reconstruct_layout.py:ro
    command: python /app/reconstruct_layout.py /output

  find_sections:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    profiles: [reconstruct]
    depends_on:
      reconstruct_layout:
        condition: service_completed_successfully
    volumes:
      - ./output:/output
      - ./reconstruct/find_sections.py:/app/find_sections.py:ro
    command: python /app/find_sections.py /output

  parse_lessons:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    profiles: [reconstruct]
    volumes:
      - ./output:/output:ro
      - ./lessons:/lessons
      - ./reconstruct/parse_lessons.py:/app/parse_lessons.py:ro
    command: python /app/parse_lessons.py /output /lessons
