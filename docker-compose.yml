services:
  preprocess:
    build: ./ocr
    volumes:
      - ./input:/input:ro
      - ./images:/images
    command: python /app/preprocess.py

  ocr:
    build: ./ocr
    depends_on:
      preprocess:
        condition: service_completed_successfully
    volumes:
      - ./images:/images:ro
      - ./output:/output
      # Cache OCR model weights so they survive `docker compose down` / rebuilds
      - paddle-models:/root/.paddlex
    command: python /app/ocr.py
    # --- GPU (optional) ---
    # Uncomment if you have nvidia-container-toolkit installed.
    # You'll also want to swap paddlepaddle for paddlepaddle-gpu in the Dockerfile.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  paddle-models:
